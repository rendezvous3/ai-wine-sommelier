name = "vectorizer-worker-qa"
main = "src/worker_entry.py"
compatibility_date = "2026-03-07"
compatibility_flags = ["python_workers"]

[vars]
INDEX_NAME = "products-qa"
MIN_QUANTITY = "5"
STALE_HOURS = "48"
LIMIT = "none"
POSTRUN_VERIFIER_URL = "https://postrun-verifier-qa.andresmeona.workers.dev"

[triggers]
crons = ["0 18,20 13 3 *"]

[limits]
cpu_ms = 300000
subrequests = 50000
