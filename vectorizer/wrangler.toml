name = "vectorizer-worker"
main = "src/worker_entry.py"
compatibility_date = "2026-03-07"
compatibility_flags = ["python_workers"]

[vars]
INDEX_NAME = "products-prod"
MIN_QUANTITY = "5"
LIMIT = "none"
POSTRUN_VERIFIER_URL = "https://postrun-verifier.andresmeona.workers.dev"

[[services]]
binding = "POSTRUN_VERIFIER_SERVICE"
service = "postrun-verifier"

[triggers]
crons = ["15 2 * * *", "15 9 * * *"]

[observability]
enabled = true

  [observability.logs]
  enabled = true
  invocation_logs = true
  head_sampling_rate = 1

[limits]
cpu_ms = 300000
subrequests = 50000
