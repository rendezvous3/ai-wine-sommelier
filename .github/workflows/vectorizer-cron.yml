name: Vectorizer Sync Cron

on:
  workflow_dispatch:
    inputs:
      index_name:
        description: "Vectorize index name"
        required: false
        default: "products-prod"
      min_quantity:
        description: "Exclude products with quantity below this value"
        required: false
        default: "5"
      stale_hours:
        description: "Delete vectors not seen for this many hours"
        required: false
        default: "48"
      limit:
        description: "Fetch limit (use 'none' for full catalog)"
        required: false
        default: "none"
  schedule:
    # Runs daily at 09:15 UTC
    - cron: "15 9 * * *"

jobs:
  sync-and-reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CANNAVITA_API_KEY: ${{ secrets.CANNAVITA_API_KEY }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_VECTORIZE_API_TOKEN: ${{ secrets.CF_VECTORIZE_API_TOKEN }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
      CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}
      INDEX_NAME: ${{ github.event.inputs.index_name || 'products-prod' }}
      MIN_QTY: ${{ github.event.inputs.min_quantity || '5' }}
      STALE_HOURS: ${{ github.event.inputs.stale_hours || '48' }}
      LIMIT: ${{ github.event.inputs.limit || 'none' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install vectorizer deps
        run: |
          python -m pip install --upgrade pip
          pip install -r vectorizer/requirements.txt

      - name: Run sync + stale reconcile
        working-directory: vectorizer/src
        run: |
          ./cron_sync_and_reconcile.sh "$INDEX_NAME" "$MIN_QTY" "$STALE_HOURS" "$LIMIT"
